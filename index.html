<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Calorie Plan — Your Personal Nutrition Dashboard</title>
    <meta name="description" content="Calculate your daily calorie needs, get personalized Indian diet plans, track your nutrition, and achieve your fitness goals with our smart calorie dashboard.">
    <meta name="keywords" content="calorie calculator, diet plan, BMI, nutrition tracker, Indian diet, health dashboard">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    
    <!-- html2pdf for PDF export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <link rel="stylesheet" href="css/main.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥗</text></svg>">
</head>
<body>
    <div id="app" class="app-container">
        <!-- Sidebar -->
        <aside id="sidebar" class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <span class="logo-icon">🥗</span>
                    <span class="logo-text">DailyCalorie</span>
                </div>
                <button id="sidebar-close" class="sidebar-close" aria-label="Close menu">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-page="dashboard" id="nav-dashboard">
                    <i data-lucide="layout-dashboard"></i>
                    <span>Dashboard</span>
                </button>
                <button class="nav-item" data-page="profile" id="nav-profile">
                    <i data-lucide="user-circle"></i>
                    <span>My Profile</span>
                </button>
                <button class="nav-item" data-page="dietplan" id="nav-dietplan">
                    <i data-lucide="utensils-crossed"></i>
                    <span>Diet Plan</span>
                </button>
                <button class="nav-item" data-page="caloriefinder" id="nav-caloriefinder">
                    <i data-lucide="search"></i>
                    <span>Calorie Finder</span>
                </button>
                <button class="nav-item" data-page="tracker" id="nav-tracker">
                    <i data-lucide="clipboard-check"></i>
                    <span>Daily Tracker</span>
                </button>
                <button class="nav-item" data-page="analytics" id="nav-analytics">
                    <i data-lucide="bar-chart-3"></i>
                    <span>Analytics</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
                    <i data-lucide="sun" class="theme-icon-light"></i>
                    <i data-lucide="moon" class="theme-icon-dark"></i>
                    <span class="theme-label">Dark Mode</span>
                </button>
                <button id="logout-btn" class="theme-toggle" style="margin-top:8px;color:var(--danger);" aria-label="Sign out">
                    <i data-lucide="log-out"></i>
                    <span>Sign Out</span>
                </button>
            </div>
        </aside>
        
        <!-- Mobile Header -->
        <header class="mobile-header">
            <button id="hamburger" class="hamburger" aria-label="Open menu">
                <i data-lucide="menu"></i>
            </button>
            <div class="mobile-logo">
                <span class="logo-icon">🥗</span>
                <span>DailyCalorie</span>
            </div>
            <button id="mobile-theme-toggle" class="mobile-theme-btn" aria-label="Toggle theme">
                <i data-lucide="sun" class="theme-icon-light"></i>
                <i data-lucide="moon" class="theme-icon-dark"></i>
            </button>
        </header>

        <!-- Overlay for mobile sidebar -->
        <div id="sidebar-overlay" class="sidebar-overlay"></div>
        
        <!-- Main Content -->
        <main id="main-content" class="main-content">
            <!-- Pages will be rendered here by JS -->
        </main>
    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Auth Module (must load first) -->
    <script src="js/auth.js"></script>
    <script>
      // Auth Guard — redirect to login BEFORE app loads
      (function() {
        const user = Auth.getCurrentUser();
        if (!user) {
          window.location.href = 'login.html';
          // Stop all further script execution
          throw new Error('Not authenticated — redirecting to login.');
        }
      })();
    </script>

    <!-- App Scripts (only run if authenticated) -->
    <script src="js/calculations.js"></script>
    <script src="js/mealData.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/components.js"></script>
    <script src="js/pages.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
